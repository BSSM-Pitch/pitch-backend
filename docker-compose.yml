services:
  postgres:
    image: postgres:16-alpine
    container_name: pitch-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-pitch}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pitch-postgres-data:/var/lib/postgresql/data

volumes:
  pitch-postgres-data:
